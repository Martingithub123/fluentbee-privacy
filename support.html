<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — FluentBee</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B1A08;
      color: #e8f5e3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 32px; font-weight: 800; color: #5ED82B; letter-spacing: -1px; margin-bottom: 8px; }
    .logo span { color: #fff; }
    .badge {
      display: inline-block;
      background: rgba(94,216,43,0.1);
      border: 1px solid rgba(94,216,43,0.3);
      color: #5ED82B;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(94,216,43,0.05);
      border: 1px solid rgba(94,216,43,0.2);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 24px; color: #fff; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
    a.btn {
      display: inline-block;
      background: #5ED82B;
      color: #0B1A08;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo">Fluent<span>Bee</span></div>
  <div class="badge">Support</div>
  <div class="card">
    <h1>Need help?</h1>
    <p>Have a question, found a bug, or want to give feedback? Send us an email and we'll get back to you within 2 business days.</p>
    <a class="btn" href="mailto:support@fluentbee.co">support@fluentbee.co</a>
  </div>
  <div class="footer">© 2026 FluentBee. Operated by Iris Salgado — United Kingdom</div>
</body>
</html>
